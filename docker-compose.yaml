services:
  auth-service-postgres:
    image: postgres:18.4-bookworm
    container_name: auth-service-postgres
    environment:
      - POSTGRES_USER=${AUTH_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AUTH_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTH_POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/auth/pgdata:/var/lib/postgresql
    ports:
      - "5430:5432"
    restart: always 
  
  auth-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/auth-service/migrations:/migrations